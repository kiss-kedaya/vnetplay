name: desktop

on:
  push:
    paths:
      - 'app/**'
      - 'desktop/**'
      - '.github/workflows/desktop.yml'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'app/**'
      - 'desktop/**'
      - '.github/workflows/desktop.yml'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag to publish, for example v0.1.0'
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: desktop-app (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux desktop dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build frontend
        working-directory: app
        run: |
          npm install
          npm run build

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Build Tauri desktop app
        working-directory: desktop
        run: npm run build:release

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vnetplay-desktop-${{ matrix.os }}
          path: |
            desktop/src-tauri/target/release/bundle/**
            desktop/src-tauri/target/release/vnetplay-desktop*
          if-no-files-found: error

  publish-release:
    name: publish desktop release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_tag != ''
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: false

      - name: Flatten release files
        shell: bash
        run: |
          mkdir -p dist-release
          find release-artifacts -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o -name '*.app.tar.gz' -o -name 'vnetplay-desktop' \) -exec cp {} dist-release/ \;
          ls -la dist-release

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          generate_release_notes: true
          files: dist-release/*
