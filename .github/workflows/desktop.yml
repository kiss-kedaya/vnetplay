name: desktop

on:
  push:
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop.yml'

jobs:
  build:
    name: desktop-rust-core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - name: Build desktop rust core
        run: cargo build --locked
