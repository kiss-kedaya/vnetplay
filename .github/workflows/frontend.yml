name: frontend

on:
  push:
    paths:
      - 'app/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'app/**'
      - '.github/workflows/frontend.yml'

jobs:
  build:
    name: frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Build frontend
        run: npm run build
